# XGenGuardian — OAuth client registry seed.
#
# Each row is one publicly-documented OAuth client_id for a well-known
# application. The verdict engine uses this to distinguish a legitimate
# consent screen ("GitHub Desktop wants access to your repos") from an
# attacker app riding the same provider host ("UNKNOWN-APP wants
# Mail.ReadWrite.All on your O365 account").
#
# Rules for what belongs here:
#
#   1. The client_id must be publicly documented (vendor source code,
#      vendor support page, vendor Graph PowerShell SDK, etc.).
#      Client_ids are NOT secrets; the secret half is client_secret,
#      which is irrelevant here.
#
#   2. The app must be a real first-party / well-known third-party app
#      that an ordinary user might encounter. Internal/corp apps don't
#      belong in this global list — operators add those via the portal.
#
#   3. sensitive_scopes lists the high-impact scopes this app is
#      legitimately allowed to request. If an attacker steals the
#      client_id and asks for scopes NOT in this list, the engine still
#      flags the consent screen as suspicious.
#
# To add an entry: append a new block, then run
#   python3 tools/oauth-seeder/seed.py
#
# Operators can add tenant-specific apps via the admin portal without
# touching this file.

clients:

  # ---- GitHub (3 documented official apps) ------------------------------

  - provider: github
    client_id: 178c6fc778ccc68e1d6a
    app_name: GitHub CLI (gh)
    publisher: GitHub
    trust_level: verified
    sensitive_scopes: [repo, read:org, workflow]
    notes: "Documented in github.com/cli/cli oauth_app.go — device-flow."

