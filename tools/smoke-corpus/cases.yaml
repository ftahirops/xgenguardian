# XGenGuardian smoke corpus — 50 cases.
#
# Each case names a URL and the expected verdict band. The run script
# (run.py) hits /v1/check, classifies the actual verdict, and computes a
# confusion matrix per category.
#
# Verdict bands:
#   allow   — engine should return ALLOW (or CLEAN); legit safe page
#   warn    — engine should return WARN; suspicious-but-not-decisive
#   block   — engine should return BLOCK; high-confidence bad
#   isolate — engine should return ISOLATE; sensitive + uncertain
#   any-deny — accept any of WARN/BLOCK/ISOLATE (don't pin the exact level)
#   any-allow — accept ALLOW or CLEAN
#
# Privacy: this corpus uses ONLY non-confidential, public, generally-known
# URLs and synthetic phish-style URLs on .example domains. Do NOT add
# real-victim URLs or anything containing credentials.
#
# Categories define the row labels in the confusion-matrix report. One
# entry per row keeps the report human-readable even when grown to 200+.

