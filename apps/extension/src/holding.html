<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Prevents malicious pages from framing this interstitial to spoof block
       UI or steal URL params — background script navigates here directly, so
       framing is never needed (audit FINDING #13). -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
  <title>Checking site safety — XGenGuardian</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0a0c11;
      color: #e8eaed;
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main { max-width: 560px; padding: 0 24px; text-align: center; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
    p  { color: #9aa3b2; margin: 0 0 24px; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #2a3142; border-top-color: #5e8bff;
      margin: 0 auto 24px; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .target {
      margin-top: 16px; padding: 10px 14px;
      background: #11141d; border: 1px solid #2a3142; border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; color: #cfd4dd; word-break: break-all;
    }
    .opener {
      margin-top: 8px; color: #6f7787; font-size: 11px;
    }
    .timeout {
      margin-top: 28px; padding: 16px;
      border: 1px solid #553030; border-radius: 8px;
      background: #1a0e0e; color: #ffb3b3; font-size: 13px;
      display: none;
    }
    .actions { margin-top: 16px; display: none; gap: 8px; justify-content: center; }
    .actions.shown { display: flex; }
    .btn {
      padding: 8px 16px; border-radius: 6px;
      text-decoration: none; font-weight: 600; font-size: 13px;
      cursor: pointer; border: 0;
    }
    .primary { background: #5e8bff; color: white; }
    .ghost   { background: transparent; border: 1px solid #2a3142; color: #cfd4dd; }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Checking site safety…</h1>
    <p id="subtitle">XGenGuardian is verifying this page before it loads.</p>
    <div class="target" id="target"></div>
    <div class="opener" id="opener" hidden></div>

    <div class="elapsed-indicator" style="margin-top:4px; color:#6f7787; font-size:11px; font-family: ui-monospace, Menlo, monospace;">
      <span id="elapsed">0.0s</span>
    </div>

    <div class="timeout" id="timeout">
      <p style="margin: 0 0 12px; color:#ffb3b3; font-weight:600;">Couldn't verify in time.</p>
      <p style="margin: 0 0 16px; color:#cfd4dd; font-size:13px;">
        The verdict service didn't respond. The site may be slow, your
        XGenGuardian backend may be unreachable, or the URL may be malformed.
        Choose how to proceed:
      </p>
      <div class="actions shown" style="flex-direction:column; gap:8px; align-items:stretch;">
        <button class="btn primary" id="allowOnceBtn">Allow this page once</button>
        <button class="btn primary" id="allowRememberBtn" style="background:#3b2a11; color:#ffc56b; border:1px solid #553e10;">Allow & remember this site for 24h</button>
        <button class="btn ghost" id="isolateBtn">Open in isolation (safest)</button>
        <button class="btn ghost" id="backBtn">Go back</button>
      </div>
    </div>
  </main>

  <script src="holding.js"></script>
</body>
</html>
