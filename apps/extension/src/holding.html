<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checking site safety — XGenGuardian</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0a0c11;
      color: #e8eaed;
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main { max-width: 560px; padding: 0 24px; text-align: center; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
    p  { color: #9aa3b2; margin: 0 0 24px; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #2a3142; border-top-color: #5e8bff;
      margin: 0 auto 24px; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .target {
      margin-top: 16px; padding: 10px 14px;
      background: #11141d; border: 1px solid #2a3142; border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px; color: #cfd4dd; word-break: break-all;
    }
    .opener {
      margin-top: 8px; color: #6f7787; font-size: 11px;
    }
    .timeout {
      margin-top: 28px; padding: 16px;
      border: 1px solid #553030; border-radius: 8px;
      background: #1a0e0e; color: #ffb3b3; font-size: 13px;
      display: none;
    }
    .actions { margin-top: 16px; display: none; gap: 8px; justify-content: center; }
    .actions.shown { display: flex; }
    .btn {
      padding: 8px 16px; border-radius: 6px;
      text-decoration: none; font-weight: 600; font-size: 13px;
      cursor: pointer; border: 0;
    }
    .primary { background: #5e8bff; color: white; }
    .ghost   { background: transparent; border: 1px solid #2a3142; color: #cfd4dd; }
  </style>
</head>
<body>
  <main>
    <div class="spinner" aria-hidden="true"></div>
    <h1>Checking site safety…</h1>
    <p id="subtitle">XGenGuardian is verifying this page before it loads.</p>
    <div class="target" id="target"></div>
    <div class="opener" id="opener" hidden></div>

    <div class="timeout" id="timeout">
      Still checking after <span id="elapsed">2.0s</span>.
      The site may be slow or unknown. Open in isolation to be safe.
      <div class="actions shown">
        <button class="btn primary" id="isolateBtn">Open in isolation</button>
        <button class="btn ghost"   id="backBtn">Go back</button>
      </div>
    </div>
  </main>

  <script src="holding.js"></script>
</body>
</html>
