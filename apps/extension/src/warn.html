<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caution — XGenGuardian</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0a0c11;
      color: #e8eaed;
      line-height: 1.55;
    }
    .wrap { max-width: 720px; margin: 80px auto; padding: 0 24px; }
    h1 { font-size: 30px; margin: 0 0 8px; }
    .pill {
      display: inline-block; background: #3b2a11; color: #ffc56b;
      font-weight: 700; padding: 4px 12px; border-radius: 999px;
      font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .panel {
      margin-top: 28px; padding: 20px;
      background: #11141d; border: 1px solid #2a3142; border-radius: 12px;
    }
    .label { color: #9aa3b2; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .value { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .row + .row { margin-top: 14px; }
    .codes li { font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: #ffd089; }
    .actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: 600;
      cursor: pointer; border: 0;
    }
    .primary { background: #2a3142; color: #cfd4dd; }
    .ghost   { background: transparent; border: 1px solid #2a3142; color: #cfd4dd; }
    .danger  { background: #4d2c2c; color: #ffb3b3; }
    .danger:disabled { opacity: 0.4; cursor: not-allowed; }
    .countdown { color: #ffc56b; font-weight: 700; }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="pill">Caution</span>
    <h1 id="title">This page has warning signs.</h1>
    <p style="color:#bcc3d0; margin-top: 4px;" id="reason">
      XGenGuardian found suspicious signals but cannot confirm this page is malicious.
    </p>

    <div class="panel">
      <div class="row"><div class="label">URL</div><div class="value" id="url"></div></div>
      <div class="row" id="codesRow" hidden>
        <div class="label">Reasons</div>
        <ul class="codes" id="codes"></ul>
      </div>
      <div class="row" id="brandRow" hidden>
        <div class="label">Visually similar to</div>
        <div class="value"><span id="brand"></span> &middot; similarity <span id="score"></span></div>
      </div>
    </div>

    <div class="actions">
      <a class="primary" href="javascript:history.back()">Go back (recommended)</a>
      <button class="danger" id="proceed" disabled>
        Proceed anyway <span class="countdown" id="cd">(5)</span>
      </button>
    </div>

    <p style="margin-top:40px; color:#6f7787; font-size:12px;">
      XGenGuardian &middot; "Proceed anyway" sends telemetry so we can refine this verdict.
    </p>
  </main>

  <script src="warn.js"></script>
</body>
</html>
